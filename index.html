<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightPath DevOps</title>
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #221f35;
    --border: #2e2b45;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e6f0;
    --muted: #8b87a8;
    --hint: #5a5775;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
    --info: #60a5fa;
    --blocked: #fb923c;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-title { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  #connectionStatus { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
  .connected { background: rgba(74,222,128,0.15); color: var(--success); }
  .disconnected { background: rgba(248,113,113,0.15); color: var(--danger); }

  /* Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Setup screen */
  #setupScreen { max-width: 480px; margin: 80px auto; background: var(--surface); border-radius: var(--radius); padding: 32px; border: 1px solid var(--border); }
  #setupScreen h2 { font-size: 20px; margin-bottom: 8px; }
  #setupScreen p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; }
  .form-group input:focus { outline: none; border-color: var(--accent); }

  /* Stats bar */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Sprint view */
  .sprint-grid { display: flex; flex-direction: column; gap: 24px; }
  .sprint-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .sprint-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .sprint-header:hover { background: var(--surface2); }
  .sprint-name { font-size: 15px; font-weight: 700; }
  .sprint-meta { display: flex; align-items: center; gap: 10px; }
  .sprint-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
  .badge-done { background: rgba(74,222,128,0.15); color: var(--success); }
  .badge-active { background: rgba(124,106,247,0.2); color: var(--accent2); }
  .badge-upcoming { background: rgba(96,165,250,0.15); color: var(--info); }
  .badge-blocked { background: rgba(251,146,60,0.15); color: var(--blocked); }
  .sprint-toggle { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .sprint-toggle.open { transform: rotate(180deg); }
  .sprint-items { display: none; }
  .sprint-items.open { display: block; }

  /* Work item */
  .work-item { padding: 14px 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 28px 80px 80px 1fr auto; gap: 12px; align-items: center; }
  .work-item:last-child { border-bottom: none; }
  .work-item:hover { background: rgba(124,106,247,0.04); }
  .item-order { font-size: 12px; color: var(--hint); font-family: monospace; text-align: center; }
  .item-type { font-size: 11px; padding: 2px 8px; border-radius: 20px; text-align: center; font-weight: 600; white-space: nowrap; }
  .type-bug { background: rgba(248,113,113,0.15); color: var(--danger); }
  .type-story { background: rgba(124,106,247,0.15); color: var(--accent2); }
  .type-feature { background: rgba(96,165,250,0.15); color: var(--info); }
  .item-status { font-size: 11px; padding: 2px 8px; border-radius: 20px; text-align: center; font-weight: 600; white-space: nowrap; }
  .status-done { background: rgba(74,222,128,0.12); color: var(--success); }
  .status-in_progress { background: rgba(124,106,247,0.2); color: var(--accent2); }
  .status-assigned_to_you { background: rgba(251,191,36,0.15); color: var(--warning); }
  .status-pending_testing { background: rgba(96,165,250,0.15); color: var(--info); }
  .status-blocked { background: rgba(251,146,60,0.15); color: var(--blocked); }
  .status-new { background: rgba(139,135,168,0.15); color: var(--muted); }
  .status-screening { background: rgba(139,135,168,0.15); color: var(--muted); }
  .item-title { font-size: 13px; color: var(--text); line-height: 1.4; }
  .item-title .item-notes { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .item-versions { text-align: right; }
  .version-tag { font-size: 10px; font-family: monospace; color: var(--hint); display: block; }
  .version-tag.deployed { color: var(--success); }

  /* Priority dot */
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
  .priority-critical { background: var(--danger); }
  .priority-high { background: var(--warning); }
  .priority-medium { background: var(--accent); }
  .priority-low { background: var(--hint); }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.1); }
  .filter-label { font-size: 12px; color: var(--hint); }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Version info bar */
  .version-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .version-bar-item { font-size: 13px; }
  .version-bar-item strong { color: var(--accent2); font-family: monospace; }
  .version-bar-label { color: var(--muted); font-size: 11px; margin-right: 6px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">✨ BrightPath DevOps</div>
    <div class="header-sub">Engineering backlog & sprint tracker</div>
  </div>
  <div class="header-actions">
    <span id="connectionStatus" class="disconnected">⚡ Not connected</span>
    <button class="btn btn-ghost" onclick="loadData()">↻ Refresh</button>
    <button class="btn btn-ghost" onclick="showSetup()">⚙ Settings</button>
  </div>
</div>

<!-- Setup Screen -->
<div id="setupScreen" style="display:none">
  <h2>Connect to Supabase</h2>
  <p>Enter your Supabase credentials to load the BrightPath DevOps backlog.</p>
  <div class="form-group">
    <label>Supabase Project URL</label>
    <input type="text" id="sbUrl" placeholder="https://xxxx.supabase.co" />
  </div>
  <div class="form-group">
    <label>Supabase Anon Key</label>
    <input type="password" id="sbKey" placeholder="eyJ..." />
  </div>
  <button class="btn btn-primary" style="width:100%" onclick="saveCredentials()">Connect & Load</button>
</div>

<!-- Main Dashboard -->
<div id="dashboard" style="display:none">
  <div class="container">

    <!-- Version bar -->
    <div class="version-bar" id="versionBar"></div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Filters -->
    <div class="filters">
      <span class="filter-label">Show:</span>
      <button class="filter-btn active" onclick="setFilter('all', this)">All sprints</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active only</button>
      <button class="filter-btn" onclick="setFilter('open', this)">Open items</button>
      <button class="filter-btn" onclick="setFilter('blocked', this)">Blocked</button>
    </div>

    <!-- Sprint blocks -->
    <div class="sprint-grid" id="sprintGrid">
      <div class="loading"><div class="spinner"></div>Loading backlog...</div>
    </div>

  </div>
</div>

<script>
let SB_URL = '';
let SB_KEY = '';
let allItems = [];
let currentFilter = 'all';

// ── Credentials ──────────────────────────────────────
function loadCredentials() {
  SB_URL = localStorage.getItem('bp_devops_url') || '';
  SB_KEY = localStorage.getItem('bp_devops_key') || '';
  return SB_URL && SB_KEY;
}
function saveCredentials() {
  SB_URL = document.getElementById('sbUrl').value.trim().replace(/\/$/, '');
  SB_KEY = document.getElementById('sbKey').value.trim();
  if(!SB_URL || !SB_KEY) { alert('Please enter both URL and key'); return; }
  localStorage.setItem('bp_devops_url', SB_URL);
  localStorage.setItem('bp_devops_key', SB_KEY);
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}
function showSetup() {
  document.getElementById('sbUrl').value = SB_URL;
  document.getElementById('sbKey').value = SB_KEY;
  document.getElementById('setupScreen').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}

// ── Data fetch ────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(
      SB_URL + '/rest/v1/work_items?select=*&order=sprint.asc,backlog_order.asc',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    if(!res.ok) throw new Error('HTTP ' + res.status);
    allItems = await res.json();
    document.getElementById('connectionStatus').textContent = '✓ Connected';
    document.getElementById('connectionStatus').className = 'connected';
    render();
  } catch(e) {
    document.getElementById('connectionStatus').textContent = '✗ Error: ' + e.message;
    document.getElementById('connectionStatus').className = 'disconnected';
  }
}

// ── Render ────────────────────────────────────────────
function render() {
  renderVersionBar();
  renderStats();
  renderSprints();
}

function renderVersionBar() {
  const deployed = allItems
    .filter(i => i.deployed_version && i.status === 'done')
    .map(i => i.deployed_version)
    .sort()
    .pop() || '—';
  const inProgress = allItems.filter(i => i.status === 'in_progress');
  const pending = allItems.filter(i => i.status === 'pending_testing');
  document.getElementById('versionBar').innerHTML = `
    <div class="version-bar-item"><span class="version-bar-label">LATEST DEPLOYED</span><strong>${deployed}</strong></div>
    <div class="version-bar-item"><span class="version-bar-label">IN PROGRESS</span><strong>${inProgress.length ? inProgress.map(i=>i.assigned_version||'—').join(', ') : '—'}</strong></div>
    <div class="version-bar-item"><span class="version-bar-label">PENDING TEST</span><strong style="color:var(--info)">${pending.length} item${pending.length!==1?'s':''}</strong></div>
    <div class="version-bar-item"><span class="version-bar-label">BLOCKED</span><strong style="color:var(--blocked)">${allItems.filter(i=>i.status==='blocked').length} item${allItems.filter(i=>i.status==='blocked').length!==1?'s':''}</strong></div>
  `;
}

function renderStats() {
  const total = allItems.length;
  const done = allItems.filter(i => i.status === 'done').length;
  const open = allItems.filter(i => i.status !== 'done').length;
  const inFlight = allItems.filter(i => ['in_progress','assigned_to_you','pending_testing'].includes(i.status)).length;
  const blocked = allItems.filter(i => i.status === 'blocked').length;
  const bugs = allItems.filter(i => i.type === 'bug' && i.status !== 'done').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value">${open}</div><div class="stat-label">Open</div></div>
    <div class="stat-card"><div class="stat-value">${inFlight}</div><div class="stat-label">In flight</div></div>
    <div class="stat-card"><div class="stat-value" style="-webkit-text-fill-color:var(--blocked)">${blocked}</div><div class="stat-label">Blocked</div></div>
    <div class="stat-card"><div class="stat-value" style="-webkit-text-fill-color:var(--danger)">${bugs}</div><div class="stat-label">Open bugs</div></div>
    <div class="stat-card"><div class="stat-value">${Math.round(done/total*100)}%</div><div class="stat-label">Complete</div></div>
  `;
}

function renderSprints() {
  let items = [...allItems];

  // Filter
  if(currentFilter === 'active') items = items.filter(i => i.sprint && !allSprintDone(i.sprint));
  if(currentFilter === 'open') items = items.filter(i => i.status !== 'done');
  if(currentFilter === 'blocked') items = items.filter(i => i.status === 'blocked');

  // Group by sprint
  const sprints = {};
  const noSprint = [];
  items.forEach(item => {
    if(!item.sprint) { noSprint.push(item); return; }
    if(!sprints[item.sprint]) sprints[item.sprint] = [];
    sprints[item.sprint].push(item);
  });

  const sprintKeys = Object.keys(sprints).sort((a, b) => {
    const numA = parseFloat((a.match(/Sprint\s+([\d.]+)/) || [])[1] || 0);
    const numB = parseFloat((b.match(/Sprint\s+([\d.]+)/) || [])[1] || 0);
    return numA - numB;
  });
  const grid = document.getElementById('sprintGrid');

  if(!sprintKeys.length && !noSprint.length) {
    grid.innerHTML = '<div class="loading">No items match this filter.</div>';
    return;
  }

  grid.innerHTML = sprintKeys.map(sprint => {
    const sprintItems = sprints[sprint];
    const isDone = sprintItems.every(i => i.status === 'done');
    const isBlocked = sprintItems.some(i => i.status === 'blocked') && sprintItems.every(i => ['blocked','done'].includes(i.status));
    const isActive = sprintItems.some(i => ['in_progress','assigned_to_you','pending_testing'].includes(i.status));
    const badgeClass = isDone ? 'badge-done' : isBlocked ? 'badge-blocked' : isActive ? 'badge-active' : 'badge-upcoming';
    const badgeText = isDone ? '✓ Done' : isBlocked ? '⚠ Blocked' : isActive ? '● Active' : '○ Upcoming';
    const doneCount = sprintItems.filter(i => i.status === 'done').length;
    const startOpen = !isDone;

    return `<div class="sprint-block">
      <div class="sprint-header" onclick="toggleSprint(this)">
        <div class="sprint-name">${sprint}</div>
        <div class="sprint-meta">
          <span style="font-size:12px;color:var(--muted)">${doneCount}/${sprintItems.length}</span>
          <span class="sprint-badge ${badgeClass}">${badgeText}</span>
          <span class="sprint-toggle ${startOpen?'open':''}">▼</span>
        </div>
      </div>
      <div class="sprint-items ${startOpen?'open':''}">
        ${sprintItems.map(renderItem).join('')}
      </div>
    </div>`;
  }).join('') + (noSprint.length ? `
    <div class="sprint-block">
      <div class="sprint-header" onclick="toggleSprint(this)">
        <div class="sprint-name" style="color:var(--muted)">Unassigned</div>
        <div class="sprint-meta">
          <span class="sprint-badge badge-upcoming">⚠ No sprint</span>
          <span class="sprint-toggle open">▼</span>
        </div>
      </div>
      <div class="sprint-items open">${noSprint.map(renderItem).join('')}</div>
    </div>` : '');
}

function allSprintDone(sprint) {
  return allItems.filter(i => i.sprint === sprint).every(i => i.status === 'done');
}

function renderItem(item) {
  const typeClass = 'type-' + item.type;
  const statusClass = 'status-' + item.status;
  const priorityClass = 'priority-' + (item.priority || 'low');
  const statusLabel = item.status.replace(/_/g, ' ');
  const assignedV = item.assigned_version ? `<span class="version-tag">assigned ${item.assigned_version}</span>` : '';
  const deployedV = item.deployed_version ? `<span class="version-tag deployed">deployed ${item.deployed_version}</span>` : '';
  const notes = item.notes ? `<div class="item-notes">${item.notes.substring(0, 120)}${item.notes.length > 120 ? '…' : ''}</div>` : '';

  return `<div class="work-item">
    <div class="item-order">${item.backlog_order ?? '—'}</div>
    <div class="item-type ${typeClass}">${item.type}</div>
    <div class="item-status ${statusClass}">${statusLabel}</div>
    <div class="item-title">
      <span class="priority-dot ${priorityClass}"></span>${item.title}
      ${notes}
    </div>
    <div class="item-versions">${assignedV}${deployedV}</div>
  </div>`;
}

function toggleSprint(header) {
  const items = header.nextElementSibling;
  const toggle = header.querySelector('.sprint-toggle');
  items.classList.toggle('open');
  toggle.classList.toggle('open');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSprints();
}

// ── Init ──────────────────────────────────────────────
if(loadCredentials()) {
  document.getElementById('dashboard').style.display = 'block';
  loadData();
} else {
  document.getElementById('setupScreen').style.display = 'block';
}
</script>
</body>
</html>
